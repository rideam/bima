#      - MYSQL_ALLOW_EMPTY_PASSWORD=yes
  db:
    image: postgres:15.1
    container_name: bimadb
    ports:
      - "5432:5432"
#    expose:
#      - 5432
    environment:
      - POSTGRES_USER=tatenda
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=project
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  admin:
    image: adminer
    container_name: bimaadminer
#    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"

#  phpmyadmin:
#    image: phpmyadmin/phpmyadmin
#    container_name: bimaphpmyadmin
#    depends_on:
#      - db
#    environment:
#      - PMA_HOST=db
#      - MYSQL_ROOT_PASSWORD=root
#    ports:
#      - "8080:80"

  api:
    build: ./api
    container_name: bimaapi
    expose:
      - 5001
    environment:
#      - DATABASE_URL=mysql+pymysql://root:password@bimadb/project
      - DATABASE_URL=postgresql+psycopg2://tatenda:password@db:5432/project
      - SECRET_KEY=0a45e366e9429bac88d86a3557087f7f1baa447e83f04ea0f04e00095b8d86fe
    volumes:
      - ./api:/app
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 5001
    depends_on:
      - db

  ui:
    build: ./ui
    container_name: bimaui
    volumes:
      - ./ui:/app
      - '/app/node_modules'
    expose:
      - 3001

  nginx:
    build: ./nginx
    container_name: bimanginx
    depends_on:
      - db
      - api
      - ui
    ports:
      - "5001:5001"
      - "8000:80"

volumes:
  postgres_data: